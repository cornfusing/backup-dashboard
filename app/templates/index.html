<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Backup Dashboard</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; }
    .cards { display: flex; gap: 20px; margin-bottom: 24px; }
    .card { border: 1px solid #ccc; border-radius: 8px; padding: 16px; width: 280px; }
    .logs { border: 1px solid #ccc; border-radius: 8px; padding: 16px; max-height: 400px; overflow-y: auto; }
    .log-entry { padding: 8px 0; border-bottom: 1px solid #eee; }
    button { margin-top: 12px; }
  </style>
</head>
<body>
  <h1>Backup Dashboard</h1>

  <div class="cards">
    <div class="card">
      <h2>Backup</h2>
      <div id="backup-status">Lade...</div>
    </div>
    <div class="card">
      <h2>Restore</h2>
      <div id="restore-status">Lade...</div>
    </div>
  </div>

  <div class="logs">
    <h2>Letzte Logs</h2>
    <div id="logs"></div>
    <button id="load-more">Mehr laden</button>
  </div>

  <script>
    let offset = 0;
    const limit = 20;

    async function loadStatus() {
      const res = await fetch('/api/status');
      const data = await res.json();

      document.getElementById('backup-status').innerHTML = `
        <p><strong>Event:</strong> ${data.backup.latest_event ?? '—'}</p>
        <p><strong>Zeit:</strong> ${data.backup.latest_ts ?? '—'}</p>
        <p><strong>Heartbeat:</strong> ${data.backup.overdue ? 'OVERDUE' : 'OK'}</p>
        <p><strong>Message:</strong> ${data.backup.message ?? '—'}</p>
      `;

      document.getElementById('restore-status').innerHTML = `
        <p><strong>Event:</strong> ${data.restore.latest_event ?? '—'}</p>
        <p><strong>Zeit:</strong> ${data.restore.latest_ts ?? '—'}</p>
        <p><strong>Heartbeat:</strong> ${data.restore.overdue ? 'OVERDUE' : 'OK'}</p>
        <p><strong>Message:</strong> ${data.restore.message ?? '—'}</p>
      `;
    }

    async function loadLogs() {
      const res = await fetch(`/api/logs?limit=${limit}&offset=${offset}`);
      const rows = await res.json();
      const logs = document.getElementById('logs');

      for (const row of rows) {
        const div = document.createElement('div');
        div.className = 'log-entry';
        div.innerHTML = `<strong>${row.ts}</strong> | ${row.source} | ${row.event} | ${row.message ?? ''}`;
        logs.appendChild(div);
      }

      offset += rows.length;
    }

    document.getElementById('load-more').addEventListener('click', loadLogs);

    loadStatus();
    loadLogs();
    setInterval(loadStatus, 15000);
  </script>
</body>
</html>
